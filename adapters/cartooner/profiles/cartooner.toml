version = 1
profile_name = "cartooner"
description = "Cartooner adapter profile for the ClawSeat harness runtime"
template_name = "cartooner"
project_name = "cartooner"
repo_root = "~/coding/cartooner"
tasks_root = "~/coding/cartooner/.tasks"
project_doc = "~/coding/cartooner/.tasks/PROJECT.md"
tasks_doc = "~/coding/cartooner/.tasks/TASKS.md"
status_doc = "~/coding/cartooner/.tasks/STATUS.md"
send_script = "{CLAWSEAT_ROOT}/.scripts/send-and-verify.sh"
status_script = "{CLAWSEAT_ROOT}/adapters/cartooner/scripts/check-cartooner-status.sh"
patrol_script = "{CLAWSEAT_ROOT}/adapters/cartooner/scripts/patrol_supervisor.py"
agent_admin = "{CLAWSEAT_ROOT}/.agent/scripts/agent_admin.py"
workspace_root = "~/.agents/workspaces/cartooner"
handoff_dir = "~/coding/cartooner/.tasks/patrol/handoffs"
heartbeat_owner = "koder"
active_loop_owner = "engineer-b"
default_notify_target = "engineer-b"
heartbeat_receipt = "~/.agents/workspaces/cartooner/koder/HEARTBEAT_RECEIPT.toml"
seats = ["koder", "engineer-b", "engineer-a", "engineer-c", "engineer-d", "engineer-e"]
heartbeat_seats = ["koder"]

[seat_roles]
koder = "frontstage-supervisor"
engineer-b = "planner-dispatcher"
engineer-a = "builder"
engineer-c = "reviewer"
engineer-d = "qa"
engineer-e = "designer"
