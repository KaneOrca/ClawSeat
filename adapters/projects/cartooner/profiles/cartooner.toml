version = 2
profile_name = "cartooner"
description = "Cartooner adapter profile for the ClawSeat harness runtime"
template_name = "cartooner"
project_name = "cartooner"
repo_root = "~/coding/cartooner"
tasks_root = "~/coding/cartooner/.tasks"
project_doc = "~/coding/cartooner/.tasks/PROJECT.md"
tasks_doc = "~/coding/cartooner/.tasks/TASKS.md"
status_doc = "~/coding/cartooner/.tasks/STATUS.md"
send_script = "{CLAWSEAT_ROOT}/core/shell-scripts/send-and-verify.sh"
status_script = "{CLAWSEAT_ROOT}/adapters/projects/cartooner/scripts/check-cartooner-status.sh"
patrol_script = "{CLAWSEAT_ROOT}/adapters/projects/cartooner/scripts/patrol_supervisor.py"
agent_admin = "{CLAWSEAT_ROOT}/core/scripts/agent_admin.py"
workspace_root = "~/.agents/workspaces/cartooner"
handoff_dir = "~/coding/cartooner/.tasks/patrol/handoffs"
heartbeat_owner = "koder"
active_loop_owner = "planner"
default_notify_target = "planner"
heartbeat_receipt = "~/.agents/workspaces/cartooner/koder/HEARTBEAT_RECEIPT.toml"
seats = ["koder"]
heartbeat_seats = ["koder"]

[seat_roles]
koder = "frontstage-supervisor"

[dynamic_roster]
enabled = true
session_root = "{AGENTS_ROOT}/sessions"
bootstrap_seats = ["koder"]
default_start_seats = ["koder"]
compat_legacy_seats = true

legacy_seats = ["engineer-b", "engineer-a", "engineer-c", "engineer-d", "engineer-e"]
role_first_seats = ["planner", "builder-1", "reviewer-1", "qa-1", "designer-1"]

[legacy_seat_roles]
engineer-b = "planner-dispatcher"
engineer-a = "builder"
engineer-c = "reviewer"
engineer-d = "qa"
engineer-e = "designer"

[role_first_seat_roles]
planner = "planner-dispatcher"
"builder-1" = "builder"
"reviewer-1" = "reviewer"
"qa-1" = "qa"
"designer-1" = "designer"
