version = 1
profile_name = "arena-pretext-ui"
description = "Arena Pretext UI project profile for the gstack harness runtime"
template_name = "gstack-harness"
project_name = "arena-pretext-ui"
repo_root = "~/coding/arena-pretext-ui"
tasks_root = "~/coding/arena-pretext-ui/.tasks"
project_doc = "~/coding/arena-pretext-ui/.tasks/PROJECT.md"
tasks_doc = "~/coding/arena-pretext-ui/.tasks/TASKS.md"
status_doc = "~/coding/arena-pretext-ui/.tasks/STATUS.md"
send_script = "{CLAWSEAT_ROOT}/.scripts/send-and-verify.sh"
status_script = "~/coding/arena-pretext-ui/.tasks/patrol/check-status.sh"
patrol_script = "~/coding/arena-pretext-ui/.tasks/patrol/patrol-supervisor.sh"
agent_admin = "{CLAWSEAT_ROOT}/.agent/scripts/agent_admin.py"
workspace_root = "~/.agents/workspaces/arena-pretext-ui"
handoff_dir = "~/coding/arena-pretext-ui/.tasks/patrol/handoffs"
heartbeat_owner = "koder"
active_loop_owner = "engineer-b"
default_notify_target = "engineer-b"
heartbeat_receipt = "~/.agents/workspaces/arena-pretext-ui/koder/HEARTBEAT_RECEIPT.toml"
seats = ["koder", "engineer-b", "engineer-a", "engineer-c", "engineer-d", "engineer-e"]
heartbeat_seats = ["koder"]

[seat_roles]
koder = "frontstage-supervisor"
engineer-b = "planner-dispatcher"
engineer-a = "builder"
engineer-c = "reviewer"
engineer-d = "qa"
engineer-e = "designer"

[seat_overrides.koder]
tool = "claude"
auth_mode = "api"
provider = "xcode-best"

[seat_overrides.engineer-a]
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"

[seat_overrides.engineer-b]
tool = "gemini"
auth_mode = "oauth"
provider = "google"

[seat_overrides.engineer-c]
tool = "codex"
auth_mode = "api"
provider = "xcode-best"

[seat_overrides.engineer-d]
tool = "claude"
auth_mode = "api"
provider = "minimax"
