# Requires gstack skills: NO — koder-only (frontstage-supervisor role); no specialist seats declared.
# For the full local /cs install chain (planner + builder + reviewer), switch to install-with-memory.toml — REQUIRES gstack skills.
# For the canonical OpenClaw overlay install, use install-openclaw.toml.
version = 1
profile_name = "starter"
description = "Generic ClawSeat starter profile — koder frontstage only. No cartooner dependency. Use install.toml for the canonical local /cs install path, install-openclaw.toml for the canonical OpenClaw install path, or full-team.toml for a ready-made six-seat roster."
template_name = "gstack-harness"
project_name = "my-project"
repo_root = "{CLAWSEAT_ROOT}"
tasks_root = "~/.agents/tasks/my-project"
project_doc = "~/.agents/tasks/my-project/PROJECT.md"
tasks_doc = "~/.agents/tasks/my-project/TASKS.md"
status_doc = "~/.agents/tasks/my-project/STATUS.md"
send_script = "{CLAWSEAT_ROOT}/core/shell-scripts/send-and-verify.sh"
status_script = "~/.agents/tasks/my-project/patrol/check-status.sh"
patrol_script = "~/.agents/tasks/my-project/patrol/patrol-supervisor.sh"
agent_admin = "{CLAWSEAT_ROOT}/core/scripts/agent_admin.py"
workspace_root = "~/.agents/workspaces/my-project"
handoff_dir = "~/.agents/tasks/my-project/patrol/handoffs"
heartbeat_owner = "koder"
active_loop_owner = "planner"
default_notify_target = "planner"
heartbeat_receipt = "~/.agents/workspaces/my-project/koder/HEARTBEAT_RECEIPT.toml"
seats = ["koder"]
heartbeat_seats = ["koder"]

[seat_roles]
koder = "frontstage-supervisor"

[dynamic_roster]
enabled = true
session_root = "~/.agents/sessions"
materialized_seats = ["koder"]
# bootstrap_seats is kept for compatibility and frontstage bootstrap intent.
bootstrap_seats = ["koder"]
default_start_seats = ["koder"]
compat_legacy_seats = false

# For the canonical /cs install workspace, copy:
# {CLAWSEAT_ROOT}/examples/starter/profiles/install.toml
# {CLAWSEAT_ROOT}/examples/starter/profiles/install-openclaw.toml
#
# For a ready-made six-seat workspace roster, copy:
# {CLAWSEAT_ROOT}/examples/starter/profiles/full-team.toml
#
# Add role-first seats as needed. Example:
# seats = ["koder", "planner", "builder-1", "reviewer-1"]
#
# [seat_roles]
# koder = "frontstage-supervisor"
# planner = "planner-dispatcher"
# builder-1 = "builder"
# reviewer-1 = "reviewer"

[patrol]
enabled = false
planner_brief_path = "~/.agents/tasks/my-project/planner/PLANNER_BRIEF.md"
