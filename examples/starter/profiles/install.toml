# Requires gstack skills: YES — declares builder / reviewer roles; preflight HARD_BLOCKs if gstack skills are missing.
# Install gstack: git clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/.gstack/repos/gstack && cd ~/.gstack/repos/gstack && ./setup
# Or if gstack is already at a non-canonical path: export GSTACK_SKILLS_ROOT=/absolute/path/to/.agents/skills
# Note: install-with-memory.toml is the canonical overlay-flow profile (this one is the legacy memory-less variant). Prefer that unless you explicitly don't want memory.
version = 1
profile_name = "install"
description = "Canonical /cs install profile — koder frontstage + planner-first install chain with builder/reviewer workspaces precreated."
template_name = "gstack-harness"
project_name = "install"
repo_root = "{CLAWSEAT_ROOT}"
tasks_root = "~/.agents/tasks/install"
project_doc = "~/.agents/tasks/install/PROJECT.md"
tasks_doc = "~/.agents/tasks/install/TASKS.md"
status_doc = "~/.agents/tasks/install/STATUS.md"
send_script = "{CLAWSEAT_ROOT}/core/shell-scripts/send-and-verify.sh"
status_script = "~/.agents/tasks/install/patrol/check-status.sh"
patrol_script = "~/.agents/tasks/install/patrol/patrol-supervisor.sh"
agent_admin = "{CLAWSEAT_ROOT}/core/scripts/agent_admin.py"
workspace_root = "~/.agents/workspaces/install"
handoff_dir = "~/.agents/tasks/install/patrol/handoffs"
heartbeat_owner = "koder"
heartbeat_transport = "tmux"
active_loop_owner = "planner"
default_notify_target = "planner"
heartbeat_receipt = "~/.agents/workspaces/install/koder/HEARTBEAT_RECEIPT.toml"
seats = ["koder", "planner", "builder-1", "reviewer-1"]
heartbeat_seats = ["koder"]

[seat_roles]
koder = "frontstage-supervisor"
planner = "planner-dispatcher"
builder-1 = "builder"
reviewer-1 = "reviewer"

[dynamic_roster]
enabled = true
session_root = "~/.agents/sessions"
materialized_seats = ["koder", "planner", "builder-1", "reviewer-1"]
runtime_seats = ["koder", "planner", "builder-1", "reviewer-1"]
# bootstrap_seats is kept for compatibility and frontstage bootstrap intent.
bootstrap_seats = ["koder"]
default_start_seats = ["koder", "planner"]
compat_legacy_seats = false

# seat_overrides are populated during the configuration phase.
# The koder frontstage skill guides the user through provider selection
# and auth setup before any backend seat is started.
# Default auth_mode is "oauth" — API mode requires explicit user opt-in.
#
# Example after configuration:
#   [seat_overrides.planner]
#   tool = "claude"
#   auth_mode = "oauth"
#
#   [seat_overrides.builder-1]
#   tool = "claude"
#   auth_mode = "oauth"
#
#   [seat_overrides.reviewer-1]
#   tool = "claude"
#   auth_mode = "oauth"

[patrol]
enabled = false
planner_brief_path = "~/.agents/tasks/install/planner/PLANNER_BRIEF.md"
