version = 1
profile_name = "full-team"
description = "Generic ClawSeat full-team starter profile — koder + planner + builder + reviewer + qa + designer. Use install.toml for the canonical /cs install chain."
template_name = "gstack-harness"
project_name = "my-project"
repo_root = "{CLAWSEAT_ROOT}"
tasks_root = "~/.agents/tasks/my-project"
project_doc = "~/.agents/tasks/my-project/PROJECT.md"
tasks_doc = "~/.agents/tasks/my-project/TASKS.md"
status_doc = "~/.agents/tasks/my-project/STATUS.md"
send_script = "{CLAWSEAT_ROOT}/core/shell-scripts/send-and-verify.sh"
status_script = "~/.agents/tasks/my-project/patrol/check-status.sh"
patrol_script = "~/.agents/tasks/my-project/patrol/patrol-supervisor.sh"
agent_admin = "{CLAWSEAT_ROOT}/core/scripts/agent_admin.py"
workspace_root = "~/.agents/workspaces/my-project"
handoff_dir = "~/.agents/tasks/my-project/patrol/handoffs"
heartbeat_owner = "koder"
active_loop_owner = "planner"
default_notify_target = "planner"
heartbeat_receipt = "~/.agents/workspaces/my-project/koder/HEARTBEAT_RECEIPT.toml"
seats = ["koder", "planner", "builder-1", "reviewer-1", "qa-1", "designer-1"]
heartbeat_seats = ["koder"]

[seat_roles]
koder = "frontstage-supervisor"
planner = "planner-dispatcher"
builder-1 = "builder"
reviewer-1 = "reviewer"
qa-1 = "qa"
designer-1 = "designer"

[dynamic_roster]
enabled = true
session_root = "~/.agents/sessions"
bootstrap_seats = ["koder"]
default_start_seats = ["koder"]
compat_legacy_seats = true

# seat_overrides are populated during the configuration phase.
# The koder frontstage skill guides the user through provider selection
# and auth setup before any backend seat is started.
# Default auth_mode is "oauth" — API mode requires explicit user opt-in.
#
# Example after configuration:
#   [seat_overrides.planner]
#   tool = "claude"
#   auth_mode = "oauth"
#
#   [seat_overrides.builder-1]
#   tool = "claude"
#   auth_mode = "oauth"

[patrol]
enabled = false
planner_brief_path = "~/.agents/tasks/my-project/planner/PLANNER_BRIEF.md"
