version = 1
template_name = "clawseat-creative"
description = "Cartooner-bound 5-seat creative team: memory orchestrates 2 image lanes + 1 av lane + patrol; all seats use cartooner skills for image / video / audio / storyboard / design / prompt domains."
# graceful-fallback: cartooner-* skills are external installs at ~/.agents/skills/cartooner-*; seats degrade gracefully when absent.
# protocol-note: this template currently uses gstack-harness as a stub protocol layer; the planned `cartooner-harness` (lane / deposit / pick / iterate primitives) will replace it once implemented.

[window_layout]
shared_memories_window_title = "clawseat-memories"
workers_window_title = "clawseat-{PROJECT}-workers"

[window_layout.workers_grid]
# memory is the orchestrator seat; builder-image is the main image lane,
# with builder-image-2 / builder-av / patrol filling the side panes.
left_main_seat = "builder-image"
left_main_width = "50%"
right_seats = ["builder-image-2", "builder-av", "patrol"]
right_fill_order = "col-major"

[defaults]
home_mode = "real"
dangerously_skip_permissions = true
window_mode = "split-2"
monitor_max_panes = 5
open_detail_windows = false
declared_skills = [
  "cartooner",
  "cartooner-image",
  "cartooner-video",
  "cartooner-audio",
  "cartooner-storyboard",
  "cartooner-design",
  "cartooner-prompt",
  "cartooner-script-development",
  "cartooner-resource-ops",
  "cartooner-seedance-cookbook",
]
workspace_tools = [
  "TOOLS/memory.md",
]

[[engineers]]
id = "memory"
display_name = "Memory"
role = "project-memory"
window = "memory"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
monitor = true
human_facing = true
active_loop_owner = true
dispatch_authority = true
patrol_authority = true
unblock_authority = true
escalation_authority = true
remind_active_loop_owner = false
review_authority = true
design_authority = true
skills = [
  "{CLAWSEAT_ROOT}/core/skills/clawseat-memory/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/clawseat-decision-escalation/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/memory-oracle/SKILL.md",
  "~/.agents/skills/cartooner/SKILL.md",
  "~/.agents/skills/cartooner-script-development/SKILL.md",
  "~/.agents/skills/cartooner-resource-ops/SKILL.md",
]
role_details = [
  "creative memory hub; coordinates lanes via dispatch, owns brief / style bible / character DNA",
  "uses cartooner router for high-level intent (CREATE / RE-RUN / MODIFY / DERIVE / MANAGE)",
  "owns script ideation (cartooner-script-development) and project-level resource coordination",
]

[[engineers]]
id = "builder-image"
display_name = "builder-image"
role = "builder-image"
window = "workers"
window_pane = "left-main"
tool = "codex"
auth_mode = "oauth"
provider = "openai"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/builder/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
  "~/.agents/skills/cartooner-image/SKILL.md",
  "~/.agents/skills/cartooner-storyboard/SKILL.md",
  "~/.agents/skills/cartooner-design/SKILL.md",
  "~/.agents/skills/cartooner-prompt/SKILL.md",
  "~/.agents/skills/nano-banana/SKILL.md",
  "~/.agents/skills/gpt-image-2/SKILL.md",
]
role_details = [
  "primary image lane: cartooner-image / cartooner-storyboard / cartooner-design",
  "executes single image, multi-panel storyboard, character design via cartooner skills",
  "fallback to nano-banana / gpt-image-2 when cartooner pipeline insufficient",
]

[[engineers]]
id = "builder-image-2"
display_name = "builder-image-2"
role = "builder-image-2"
window = "workers"
window_pane = "top-right"
tool = "codex"
auth_mode = "oauth"
provider = "openai"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/builder/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
  "~/.agents/skills/cartooner-image/SKILL.md",
  "~/.agents/skills/cartooner-storyboard/SKILL.md",
  "~/.agents/skills/cartooner-design/SKILL.md",
  "~/.agents/skills/cartooner-prompt/SKILL.md",
  "~/.agents/skills/nano-banana/SKILL.md",
  "~/.agents/skills/gpt-image-2/SKILL.md",
]
