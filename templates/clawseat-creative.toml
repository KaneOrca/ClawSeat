version = 1
template_name = "clawseat-creative"
description = "Creative v2 roster: memory orchestrates planner, codex builder, patrol, and gemini designer in split-2 workers layout"

[window_layout]
shared_memories_window_title = "clawseat-memories"
workers_window_title = "clawseat-{PROJECT}-workers"

[window_layout.workers_grid]
left_main_seat = "planner"
left_main_width = "50%"
right_seats = ["builder", "patrol", "designer"]
right_fill_order = "col-major"

[defaults]
home_mode = "real"
dangerously_skip_permissions = true
window_mode = "split-2"
monitor_max_panes = 4
open_detail_windows = false
workspace_tools = [
  "TOOLS/memory.md",
]

[[engineers]]
id = "memory"
display_name = "Memory"
role = "project-memory"
window = "memory"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
monitor = true
human_facing = true
active_loop_owner = false
dispatch_authority = true
patrol_authority = true
unblock_authority = true
escalation_authority = true
remind_active_loop_owner = false
review_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/clawseat-memory/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/clawseat-decision-escalation/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/memory-oracle/SKILL.md",
]
role_details = [
  "project memory hub; owns project context, dispatch, escalation, and Phase-A coordination",
]

[[engineers]]
id = "planner"
display_name = "creative-planner"
role = "creative-planner"
window = "workers"
window_pane = "left-main"
tool = "claude"
auth_mode = "api"
provider = "deepseek"
model = "deepseek-v4-pro"
monitor = true
human_facing = false
active_loop_owner = true
dispatch_authority = true
patrol_authority = false
unblock_authority = false
escalation_authority = true
remind_active_loop_owner = false
review_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-planner/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/cs-structure/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative planner: owns structure, task planning, and dispatch to creative workers",
  "dispatches builder for classification, patrol for verification, and designer for writing/scoring",
]

[[engineers]]
id = "builder"
display_name = "creative-builder"
role = "creative-builder"
window = "workers"
window_pane = "top-right"
tool = "codex"
auth_mode = "oauth"
provider = "openai"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-builder/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/cs-classify/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative classification seat powered by Codex",
  "executes cs-classify only; writing and scoring remain designer responsibilities",
]

[[engineers]]
# qa is a 6-month alias — both names accepted
id = "patrol"
display_name = "patrol"
role = "patrol"
window = "workers"
window_pane = "middle-right"
tool = "claude"
auth_mode = "api"
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
base_url = "https://api.minimaxi.com/anthropic"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = true
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/patrol/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "test-execution and patrol seat; reports evidence without modifying code",
]

[[engineers]]
id = "designer"
display_name = "creative-designer"
role = "creative-designer"
window = "workers"
window_pane = "bottom-right"
tool = "gemini"
auth_mode = "oauth"
provider = "google"
monitor = true
optional = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = true
design_authority = true
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-designer/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/cs-write/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/cs-score/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative execution and review seat powered by Gemini",
  "executes cs-write, cs-score, and creative review after planner dispatch",
]
