version = 1
template_name = "clawseat-creative"
description = "Creative-project roster: ancestor + creative-planner (also produces content) + creative-designer + creative-qa (passive scoring)"

[defaults]
window_mode = "tabs-1up"
monitor_max_panes = 3
open_detail_windows = false
workspace_tools = [
  "TOOLS/memory.md",
]

[[engineers]]
id = "ancestor"
display_name = "ancestor"
role = "ancestor"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = true
unblock_authority = true
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/clawseat-ancestor/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/clawseat-install/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/memory-oracle/SKILL.md",
]
role_details = [
  "project ancestor; owns seat lifecycle, patrol, and Phase-A execution",
]

[[engineers]]
id = "planner"
display_name = "creative-planner"
role = "creative-planner"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
monitor = true
human_facing = false
active_loop_owner = true
dispatch_authority = true
patrol_authority = false
unblock_authority = false
escalation_authority = true
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-planner/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative planner: produces world-building docs, character bios, and story/episode outlines",
  "dispatches creative-designer (gemini) for actual long-form text writing of each unit",
  "dispatches creative-qa for passive scoring and optional Feishu publication",
  "does NOT write long-form text itself — owns structure, delegates execution to designer",
  "can fan-out multiple designer instances for parallel chapter writing",
]

[[engineers]]
id = "designer"
display_name = "creative-designer"
role = "creative-designer"
tool = "gemini"
auth_mode = "oauth"
provider = "google"
monitor = true
optional = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = true
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-designer/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative writing execution seat powered by Gemini (long-context, creative generation)",
  "receives world-building docs + character bios + chapter/episode outline from planner",
  "writes actual long-form text (chapters, episodes, scripts) based on the structural docs",
  "does NOT modify the outline structure — escalates structural issues to planner",
  "returns finished manuscript units to planner via complete_handoff.py",
]

[[engineers]]
id = "qa"
display_name = "creative-qa"
role = "creative-qa"
tool = "claude"
auth_mode = "api"
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
qa_authority = true
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-qa/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative QA: passive scoring and quality assessment; activated by planner's complete_handoff",
  "scores deliveries against rubric criteria (coherence, tone, visual consistency, completeness)",
  "optionally publishes scored summary to Feishu when configured; does not modify content",
]
