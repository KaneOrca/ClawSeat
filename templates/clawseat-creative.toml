version = 1
template_name = "clawseat-creative"
description = "ancestor + planner(planning) + builder(codex, executes cs-classify) + designer(gemini, executes cs-write + cs-score + review)"

[defaults]
window_mode = "tabs-1up"
monitor_max_panes = 3
open_detail_windows = false
workspace_tools = [
  "TOOLS/memory.md",
]

[[engineers]]
id = "ancestor"
display_name = "ancestor"
role = "ancestor"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = true
unblock_authority = true
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/clawseat-ancestor/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/clawseat-install/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/memory-oracle/SKILL.md",
]
role_details = [
  "project ancestor; owns seat lifecycle, patrol, and Phase-A execution",
]

[[engineers]]
id = "planner"
display_name = "creative-planner"
role = "creative-planner"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
monitor = true
human_facing = false
active_loop_owner = true
dispatch_authority = true
patrol_authority = false
unblock_authority = false
escalation_authority = true
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-planner/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/cs-structure/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative planner: produces world-building docs, character bios, and story/episode outlines",
  "dispatches creative-builder (codex) to execute cs-classify (workflow classification)",
  "dispatches creative-designer (gemini) for cs-write (writing) + cs-score (scoring) + review",
  "does NOT execute atomic tools itself — owns structure and coordination",
  "can fan-out multiple builder instances for parallel unit execution",
]

[[engineers]]
id = "builder"
display_name = "creative-builder"
role = "creative-builder"
tool = "codex"
auth_mode = "oauth"
provider = "openai"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-builder/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/cs-classify/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative classification seat powered by Codex (OpenAI OAuth)",
  "executes cs-classify / cs-classify-short — workflow classification only",
  "receives TODO from planner, classifies, delivers to designer via complete_handoff",
  "does NOT write content — writing is designer's responsibility",
  "does NOT score — scoring is designer's responsibility",
]

[[engineers]]
id = "designer"
display_name = "creative-designer"
role = "creative-designer"
tool = "gemini"
auth_mode = "oauth"
provider = "google"
monitor = true
optional = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = true
qa_authority = true
design_authority = true
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/creative-designer/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/cs-write/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/cs-score/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "creative execution + review seat powered by Gemini (Google OAuth)",
  "executes cs-write (long-form writing) + cs-score (rubric scoring) + review in one dispatch",
  "issues APPROVED / APPROVED_WITH_NITS / CHANGES_REQUESTED verdicts",
  "receives builder's classification, writes content, scores, and returns verdict to planner",
]
