session_name: clawseat-monitor
start_directory: "~/ClawSeat"
windows:
  - window_name: clawseat
    layout: tiled
    panes:
      - shell_command: 'exec env -u TMUX tmux attach -t clawseat-ancestor 2>/dev/null || exec "${SHELL:-/bin/zsh}" -l'
      - shell_command: 'exec env -u TMUX tmux attach -t clawseat-planner 2>/dev/null || exec "${SHELL:-/bin/zsh}" -l'
      - shell_command: 'exec env -u TMUX tmux attach -t clawseat-builder 2>/dev/null || exec "${SHELL:-/bin/zsh}" -l'
      - shell_command: 'exec env -u TMUX tmux attach -t clawseat-reviewer 2>/dev/null || exec "${SHELL:-/bin/zsh}" -l'
      - shell_command: 'exec env -u TMUX tmux attach -t clawseat-qa 2>/dev/null || exec "${SHELL:-/bin/zsh}" -l'
      - shell_command: 'exec env -u TMUX tmux attach -t clawseat-designer 2>/dev/null || exec "${SHELL:-/bin/zsh}" -l'
