version = 1
template_name = "clawseat-solo"
description = "Minimal 3-seat creation-focused template. Memory + builder + designer, all OAuth top models. Memory SWALLOWs planner orchestration. Creative atomic skills on tool homes, trigger on demand."

[window_layout]
shared_memories_window_title = "clawseat-memories"
workers_window_title = "clawseat-{PROJECT}-workers"

[window_layout.workers_grid]
left_main_seat = "builder"
left_main_width = "50%"
right_seats = ["designer"]
right_fill_order = "col-major"

[defaults]
home_mode = "real"
dangerously_skip_permissions = true
window_mode = "split-2"
monitor_max_panes = 3
open_detail_windows = false
workspace_tools = ["TOOLS/memory.md"]

[[engineers]]
id = "memory"
display_name = "Memory"
role = "project-memory"
window = "memory"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
monitor = true
human_facing = true
active_loop_owner = true
dispatch_authority = true
patrol_authority = true
unblock_authority = true
escalation_authority = true
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/clawseat-memory/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/clawseat-decision-escalation/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/clawseat-koder/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/clawseat-memory-reporting/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/clawseat-privacy/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/memory-oracle/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/planner/SKILL.md",
  "~/.agents/skills/skill-creator/SKILL.md",
  "~/.agents/skills/find-skills/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "L3 hub + SWALLOW planner orchestration (no planner seat)",
  "dispatch_authority + active_loop_owner + patrol_authority + escalation",
  "skill management: can trigger find-skills + skill-creator for self/builder/designer",
]

[[engineers]]
id = "builder"
display_name = "Builder"
role = "code-builder"
window = "workers"
window_pane = "left-main"
tool = "codex"
auth_mode = "oauth"
provider = "openai"
monitor = true
human_facing = false
review_authority = false
qa_authority = false
design_authority = false
dispatch_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/builder/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "Implementation seat (codex oauth). Self-review + memory final verdict. No reviewer seat.",
]

[[engineers]]
id = "designer"
display_name = "Designer"
role = "designer"
window = "workers"
tool = "gemini"
auth_mode = "oauth"
provider = "google"
monitor = true
human_facing = false
design_authority = true
review_authority = false
qa_authority = false
dispatch_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/designer/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "Visual + creative seat (gemini oauth). Multimodal: images, text, multimodal analysis.",
  "21+ creative atomic skills (cartooner-* / storyboard-* / nano-banana / heygen / heyvideogen / minimax-speech / song-creator) available in tool homes on demand — not preloaded.",
]
