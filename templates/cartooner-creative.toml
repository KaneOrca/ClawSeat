version = 1
template_name = "cartooner-creative"
description = "Cartooner-specific creative roster: memory directly executes creative work (script / art / music / asset library); writer + visual seats specialize on demand; patrol smoke-tests cartooner skill availability."

[window_layout]
shared_memories_window_title = "clawseat-memories"
workers_window_title = "clawseat-{PROJECT}-workers"

[window_layout.workers_grid]
# Source-of-truth: agent_admin_window._PRIMARY_SEAT_IDS = {"ancestor", "memory"}
# filters memory out of workers payload — memory always renders as a tab in
# the shared clawseat-memories window. Workers grid here is the 3 non-primary
# seats: writer (left main, deep script craft) + visual + patrol (right column).
left_main_seat = "writer"
left_main_width = "50%"
right_seats = ["visual", "patrol"]
right_fill_order = "col-major"

[defaults]
home_mode = "real"
dangerously_skip_permissions = true
window_mode = "split-2"
monitor_max_panes = 4
open_detail_windows = false
declared_skills = [
  "cartooner-image",
  "cartooner-video",
  "cartooner-audio",
  "cartooner-storyboard",
  "cartooner-design",
  "cartooner-prompt",
  "cartooner-persist",
  "cartooner-resource-ops",
  "cartooner-browser",
]
workspace_tools = [
  "TOOLS/cartooner-memory.md",
]

[[engineers]]
id = "memory"
display_name = "cartooner-memory"
role = "cartooner-memory"
window = "memory"
tool = "codex"
auth_mode = "oauth"
provider = "openai"
monitor = true
human_facing = true
active_loop_owner = true
dispatch_authority = true
patrol_authority = true
unblock_authority = true
escalation_authority = true
remind_active_loop_owner = false
review_authority = true
design_authority = true
skills = [
  "{HOME}/.agents/skills/cartooner-image/SKILL.md",
  "{HOME}/.agents/skills/cartooner-video/SKILL.md",
  "{HOME}/.agents/skills/cartooner-audio/SKILL.md",
  "{HOME}/.agents/skills/cartooner-storyboard/SKILL.md",
  "{HOME}/.agents/skills/cartooner-design/SKILL.md",
  "{HOME}/.agents/skills/cartooner-prompt/SKILL.md",
  "{HOME}/.agents/skills/cartooner-persist/SKILL.md",
  "{HOME}/.agents/skills/cartooner-resource-ops/SKILL.md",
  "{HOME}/.agents/skills/cartooner-browser/SKILL.md",
  "{HOME}/.agents/skills/script-writing-expert/SKILL.md",
  "{HOME}/.agents/skills/script-analyst/SKILL.md",
  "{HOME}/.agents/skills/storyboard-expert/SKILL.md",
  "{HOME}/.agents/skills/storyboard-forge/SKILL.md",
  "{HOME}/.agents/skills/viral-copywriter/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "directly converses with operator and executes 90% of creative work",
  "owns: script ideation, script writing, art style direction, music style direction",
  "directly invokes cartooner skill CLI for image/music generation",
  "maintains and governs ~/.cartooner/ asset library (atoms/molecules/workflows)",
  "tmux send-keys writer when needs deep Chinese script craft",
  "tmux send-keys visual when needs visual design / image generation execution",
  "does NOT use gstack-harness; coordination via tmux + ~/.cartooner/_handoff/ files",
]

[[engineers]]
id = "writer"
display_name = "cartooner-writer"
role = "cartooner-writer"
window = "workers"
window_pane = "left-main"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
review_authority = false
design_authority = false
remind_active_loop_owner = false
skills = [
  "{HOME}/.agents/skills/script-writing-expert/SKILL.md",
  "{HOME}/.agents/skills/script-analyst/SKILL.md",
  "{HOME}/.agents/skills/viral-copywriter/SKILL.md",
  "{HOME}/.agents/skills/cartooner-prompt/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "deep Chinese script / viral copy / dialog craft on memory's request",
  "Fountain script writing via script-writing-expert",
  "delivers via writing to ~/.cartooner/_handoff/ then tmux notify memory",
]

[[engineers]]
id = "visual"
display_name = "cartooner-visual"
role = "cartooner-visual"
window = "workers"
window_pane = "top-right"
tool = "gemini"
auth_mode = "oauth"
provider = "google"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
review_authority = true
design_authority = true
remind_active_loop_owner = false
skills = [
  "{HOME}/.agents/skills/cartooner-image/SKILL.md",
  "{HOME}/.agents/skills/cartooner-storyboard/SKILL.md",
  "{HOME}/.agents/skills/cartooner-design/SKILL.md",
  "{HOME}/.agents/skills/storyboard-expert/SKILL.md",
  "{HOME}/.agents/skills/storyboard-forge/SKILL.md",
  "{HOME}/.agents/skills/nano-banana/SKILL.md",
  "{HOME}/.agents/skills/gpt-image-2/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "visual development (character / scene / prop / storyboard)",
  "art direction expertise on memory's request",
  "executes complex storyboard / multi-panel grids when memory needs help",
  "delivers via image to ~/.cartooner/_handoff/ then tmux notify memory",
]

[[engineers]]
id = "patrol"
display_name = "cartooner-patrol"
role = "cartooner-patrol"
window = "workers"
window_pane = "bottom-right"
tool = "claude"
auth_mode = "api"
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
base_url = "https://api.minimaxi.com/anthropic"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = true
unblock_authority = false
escalation_authority = false
review_authority = false
design_authority = false
remind_active_loop_owner = false
skills = [
  "{HOME}/.agents/skills/cartooner-resource-ops/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/patrol/SKILL.md",
  "{CLAWSEAT_ROOT}/core/skills/tmux-basics/SKILL.md",
]
role_details = [
  "weekly cartooner skill smoke test: nb2/nbp/seedance/minimax SLA + ~/.cartooner/ workflow integrity",
  "alerts memory when service degraded or workflow references broken",
  "does NOT modify code or config",
]
