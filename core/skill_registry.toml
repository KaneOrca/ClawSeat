version = 1
description = "ClawSeat skill registry — single source of truth for all skill dependencies"

# ── Bundled skills (shipped with ClawSeat) ─────────────────────────

[[skills]]
name = "gstack-harness"
source = "bundled"
path = "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md"
required = true
roles = ["frontstage-supervisor", "planner-dispatcher", "builder", "reviewer", "qa", "designer"]
description = "Shared runtime: seat schema, dispatch/completion/ACK protocol, heartbeat, patrol"

[[skills]]
