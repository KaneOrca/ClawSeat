version = 1
template_name = "cartooner"
description = "Role-first frontend harness template: koder + planner/builder/reviewer/qa/designer crew"

[defaults]
window_mode = "tabs-1up"
monitor_max_panes = 4
open_detail_windows = false

[[engineers]]
id = "koder"
display_name = "koder"
aliases = ["frontstage"]
role = "frontstage-supervisor"
monitor = true
human_facing = true
active_loop_owner = false
dispatch_authority = false
patrol_authority = true
unblock_authority = true
escalation_authority = true
remind_active_loop_owner = true
review_authority = false
qa_authority = false
design_authority = false
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
model = "opus"
effort = "max"
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "{CLAWSEAT_ROOT}/adapters/projects/cartooner/skills/cartooner-koder/SKILL.md",
]
role_details = [
  "runtime seat id remains koder; canonical framework role is frontstage-supervisor",
  "user-facing intake and product clarification",
  "do intake framing and scope clarification before handing active work to planner; do not own execution planning or next-hop routing",
  "patrol the chain state and summarize progress for the user",
  "receive escalations from planner and reframe when needed",
  "when a stage closeout becomes visible in the Feishu group, reconcile the delivery trail and update the project docs before summarizing to the user",
  "when planner uses lark-cli user identity in Feishu, do not trust sender identity; only consume OC_DELEGATION_REPORT_V1 as a machine-readable delegation receipt",
  "do not absorb builder, reviewer, QA, or designer specialist work",
]

[[engineers]]
id = "planner"
role = "planner-dispatcher"
tool = "claude"
auth_mode = "oauth"
provider = "anthropic"
model = "opus"
effort = "max"
monitor = true
aliases = ["dispatcher"]
human_facing = false
active_loop_owner = true
dispatch_authority = true
patrol_authority = false
unblock_authority = false
escalation_authority = true
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = false
skills = ["{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md"]
role_details = [
  "engineer-task initialization, research coordination, execution planning, next-hop routing, and durable consumption of specialist completions",
  "planner owns Feishu user-identity closeout and decision-gate receipts through `OC_DELEGATION_REPORT_V1`; legacy group broadcast stays opt-in only",
  "planner coordinates specialists but does not absorb concrete implementation, review, QA, or design execution",
  "when the group bridge is user-identity based, emit `OC_DELEGATION_REPORT_V1` for koder-facing receipts instead of relying on sender identity",
]

[[engineers]]
id = "builder-1"
role = "builder"
tool = "codex"
auth_mode = "api"
provider = "xcode-best"
model = "gpt-5.4"
effort = "high"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-investigate/SKILL.md",
]
role_details = [
  "default implementation seat for code, script, config, template, and document changes",
  "use the latest gstack implementation/debugging workflow instead of asking planner to perform concrete edits",
  "return implementation artifacts to planner; do not self-close the chain",
]

[[engineers]]
id = "reviewer-1"
role = "reviewer"
tool = "codex"
auth_mode = "api"
provider = "xcode-best"
model = "gpt-5.4"
effort = "high"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = true
qa_authority = false
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-review/SKILL.md",
]
role_details = [
  "default review gate for docs / templates / skills / protocol / config / source changes",
  "use the latest gstack review workflow and canonical verdicts",
  "return verdicts to planner; do not reroute the chain yourself",
]

[[engineers]]
id = "qa-1"
role = "qa"
tool = "claude"
auth_mode = "api"
provider = "minimax"
model = "MiniMax-M2.7-highspeed"
effort = "auto"
monitor = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
qa_authority = true
design_authority = false
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-qa/SKILL.md",
]
role_details = [
  "default verification / smoke / regression lane",
  "use the latest gstack QA workflow for verification-heavy execution",
  "prefer MiniMax-M2.7-highspeed for test-heavy execution",
]

[[engineers]]
id = "designer-1"
role = "designer"
tool = "gemini"
auth_mode = "oauth"
provider = "google"
monitor = true
optional = true
human_facing = false
active_loop_owner = false
dispatch_authority = false
patrol_authority = false
unblock_authority = false
escalation_authority = false
remind_active_loop_owner = false
review_authority = false
qa_authority = false
design_authority = true
skills = [
  "{CLAWSEAT_ROOT}/core/skills/gstack-harness/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-design-review/SKILL.md",
]
role_details = [
  "default visual review and design-direction seat",
  "use the latest gstack design-review workflow for visual QA and design corrections",
  "design-driven UI prototypes / visual shells, not production wiring or full feature completion",
]
